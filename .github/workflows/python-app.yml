name: Python application

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        run: |
          set +e
          pytest
          exit_code=$?
          set -e
          if [ $exit_code -eq 5 ]; then
            echo "No tests were collected; continuing."
            exit 0
          fi
          exit $exit_code

  package:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build executable
        run: python scripts/package.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyflow-${{ runner.os }}
          path: |
            dist/pyflow-linux
            dist/pyflow-darwin
            dist/pyflow-windows.exe
          if-no-files-found: error

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pyflow-*
          path: release-assets

      - name: Prepare release files
        run: |
          mkdir -p release-upload
          cp release-assets/pyflow-Linux/pyflow-linux release-upload/pyflow-linux-amd64
          cp release-assets/pyflow-Windows/pyflow-windows.exe release-upload/pyflow-windows-amd64.exe
          cp release-assets/pyflow-macOS/pyflow-darwin release-upload/pyflow-macos-amd64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-upload/pyflow-linux-amd64
            release-upload/pyflow-windows-amd64.exe
            release-upload/pyflow-macos-amd64
